<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0b"/>

  <!-- Inner glow -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="#111113"/>

  <!-- Alpha symbol stylized as chart line -->
  <g transform="translate(96, 96)">
    <!-- Background circle -->
    <circle cx="160" cy="160" r="140" fill="#1a1a1d" stroke="#3b82f6" stroke-width="4"/>

    <!-- Alpha symbol -->
    <text x="160" y="200"
          font-family="Inter, -apple-system, sans-serif"
          font-size="180"
          font-weight="700"
          fill="#3b82f6"
          text-anchor="middle">
      α
    </text>

    <!-- Rising chart line -->
    <path d="M60 220 L110 180 L160 200 L210 120 L260 80"
          stroke="#22c55e"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
          opacity="0.8"/>

    <!-- Data points -->
    <circle cx="60" cy="220" r="6" fill="#22c55e"/>
    <circle cx="110" cy="180" r="6" fill="#22c55e"/>
    <circle cx="160" cy="200" r="6" fill="#22c55e"/>
    <circle cx="210" cy="120" r="6" fill="#22c55e"/>
    <circle cx="260" cy="80" r="8" fill="#22c55e"/>
  </g>
</svg>
