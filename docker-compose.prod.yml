# Production Docker Compose Configuration
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in .env.prod or environment):
# - POSTGRES_PASSWORD
# - JWT_SECRET_KEY
# - NEXTAUTH_SECRET
# - NEXT_PUBLIC_API_URL
# - NEXT_PUBLIC_WS_URL
# - IMAGE_TAG (defaults to 'latest')

version: '3.8'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    tag: "{{.Name}}"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-newsuser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-newsdb}
  REDIS_URL: redis://redis:6379/0
  OPENSEARCH_URL: http://opensearch:9200
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  JWT_ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  ENVIRONMENT: production
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  # ===========================================
  # Application Services
  # ===========================================

  # FastAPI Backend
  api:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPO:-ktmanimations/news-scraper}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - news-scraper-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging: *default-logging
    labels:
      - "com.news-scraper.service=api"
      - "com.news-scraper.env=production"

  # Celery Workers - High Priority
  celery-worker-high:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPO:-ktmanimations/news-scraper}/api:${IMAGE_TAG:-latest}
    command: celery -A backend.workers.celery_app worker -l info -Q critical,high --concurrency=${CELERY_HIGH_CONCURRENCY:-4}
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - news-scraper-network
    deploy:
      replicas: ${CELERY_HIGH_REPLICAS:-2}
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging: *default-logging
    labels:
      - "com.news-scraper.service=celery-worker-high"
      - "com.news-scraper.env=production"

  # Celery Workers - Default/Low Priority
  celery-worker-default:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPO:-ktmanimations/news-scraper}/api:${IMAGE_TAG:-latest}
    command: celery -A backend.workers.celery_app worker -l info -Q default,low --concurrency=${CELERY_DEFAULT_CONCURRENCY:-2}
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - news-scraper-network
    deploy:
      replicas: ${CELERY_DEFAULT_REPLICAS:-1}
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging: *default-logging
    labels:
      - "com.news-scraper.service=celery-worker-default"
      - "com.news-scraper.env=production"

  # Celery Beat Scheduler
  celery-beat:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPO:-ktmanimations/news-scraper}/api:${IMAGE_TAG:-latest}
    command: celery -A backend.workers.celery_app beat -l info --pidfile=/tmp/celerybeat.pid
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - news-scraper-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging: *default-logging
    labels:
      - "com.news-scraper.service=celery-beat"
      - "com.news-scraper.env=production"

  # NLP Service (FinBERT)
  nlp-service:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPO:-ktmanimations/news-scraper}/api:${IMAGE_TAG:-latest}
    command: python -m backend.processing.sentiment.finbert_service
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      MODEL_CACHE_DIR: /app/models
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - model-cache:/app/models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - news-scraper-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    logging: *default-logging
    labels:
      - "com.news-scraper.service=nlp-service"
      - "com.news-scraper.env=production"

  # WebSocket Server
  websocket-server:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPO:-ktmanimations/news-scraper}/api:${IMAGE_TAG:-latest}
    command: uvicorn backend.api.websocket.streamer:router --host 0.0.0.0 --port 8001 --workers ${WS_WORKERS:-2}
    restart: unless-stopped
    ports:
      - "${WS_PORT:-8001}:8001"
    environment:
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - news-scraper-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging: *default-logging
    labels:
      - "com.news-scraper.service=websocket-server"
      - "com.news-scraper.env=production"

  # Next.js Frontend
  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPO:-ktmanimations/news-scraper}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_MOCK_MODE: "false"
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - news-scraper-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging: *default-logging
    labels:
      - "com.news-scraper.service=frontend"
      - "com.news-scraper.env=production"

  # ===========================================
  # Infrastructure Services
  # ===========================================

  # TimescaleDB (PostgreSQL with time-series extension)
  postgres:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-newsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-newsdb}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - news-scraper-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsuser} -d ${POSTGRES_DB:-newsdb}"]
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging: *default-logging
    labels:
      - "com.news-scraper.service=postgres"
      - "com.news-scraper.env=production"
    # Note: Do not expose port externally in production
    # Use SSH tunnel or VPN for direct database access

  # Redis (Cache, Pub/Sub, Celery broker)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
    volumes:
      - redis-data:/data
    networks:
      - news-scraper-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: ${REDIS_MAXMEMORY:-512mb}
        reservations:
          cpus: '0.25'
          memory: 128M
    logging: *default-logging
    labels:
      - "com.news-scraper.service=redis"
      - "com.news-scraper.env=production"

  # OpenSearch (Full-text search)
  opensearch:
    image: opensearchproject/opensearch:2
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms${OPENSEARCH_HEAP:-1g} -Xmx${OPENSEARCH_HEAP:-1g}
      - bootstrap.memory_lock=true
      - cluster.name=news-scraper-cluster
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - news-scraper-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging: *default-logging
    labels:
      - "com.news-scraper.service=opensearch"
      - "com.news-scraper.env=production"

  # Redpanda (Kafka-compatible message streaming)
  redpanda:
    image: redpandadata/redpanda:latest
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://${REDPANDA_EXTERNAL_HOST:-localhost}:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://${REDPANDA_EXTERNAL_HOST:-localhost}:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp ${REDPANDA_SMP:-2}
      - --memory ${REDPANDA_MEMORY:-2G}
      - --reserve-memory 0M
      - --overprovisioned
      - --default-log-level=warn
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - news-scraper-network
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging: *default-logging
    labels:
      - "com.news-scraper.service=redpanda"
      - "com.news-scraper.env=production"

  # ===========================================
  # Reverse Proxy (Optional - enable if needed)
  # ===========================================

  # Nginx Reverse Proxy (uncomment to enable)
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./deploy/nginx/certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - api
  #     - frontend
  #     - websocket-server
  #   networks:
  #     - news-scraper-network
  #   healthcheck:
  #     <<: *healthcheck-defaults
  #     test: ["CMD", "nginx", "-t"]
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.5'
  #         memory: 128M
  #   logging: *default-logging
  #   labels:
  #     - "com.news-scraper.service=nginx"
  #     - "com.news-scraper.env=production"

networks:
  news-scraper-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  opensearch-data:
    driver: local
  redpanda-data:
    driver: local
  model-cache:
    driver: local
