version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://newsuser:newspass@postgres:5432/newsdb
      - REDIS_URL=redis://redis:6379/0
      - OPENSEARCH_URL=http://opensearch:9200
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app/backend/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_started
    networks:
      - news-scraper-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker - Critical/High priority queues
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.workers.celery_app worker -l info -Q critical,high,default,low
    environment:
      - DATABASE_URL=postgresql+asyncpg://newsuser:newspass@postgres:5432/newsdb
      - REDIS_URL=redis://redis:6379/0
      - OPENSEARCH_URL=http://opensearch:9200
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - KAFKA_BROKERS=redpanda:9092
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=newsuser
      - PGPASSWORD=newspass
      - PGDATABASE=newsdb
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION_DAYS=7
    volumes:
      - ./backend:/app/backend
      - ./scripts:/app/scripts:ro
      - db-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - news-scraper-network
    deploy:
      replicas: 2

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.workers.celery_app beat -l info
    environment:
      - DATABASE_URL=postgresql+asyncpg://newsuser:newspass@postgres:5432/newsdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - news-scraper-network

  # Flower - Celery Monitoring
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.workers.celery_app flower --port=5555 --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLOWER_BASIC_AUTH=admin:admin
      - FLOWER_PERSISTENT=true
      - FLOWER_DB=/data/flower.db
    volumes:
      - ./backend:/app/backend
      - flower-data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - news-scraper-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # NLP Service (FinBERT)
  nlp-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m backend.processing.sentiment.finbert_service
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MODEL_CACHE_DIR=/app/models
    volumes:
      - ./backend:/app/backend
      - model-cache:/app/models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - news-scraper-network
    # Uncomment below for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # WebSocket Server
  websocket-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn backend.api.websocket.streamer:router --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
    volumes:
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - news-scraper-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
      - NEXT_PUBLIC_MOCK_MODE=true
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-nextauth-secret-change-in-production
    depends_on:
      - api
    networks:
      - news-scraper-network

  # TimescaleDB (PostgreSQL with time-series extension)
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      - POSTGRES_USER=newsuser
      - POSTGRES_PASSWORD=newspass
      - POSTGRES_DB=newsdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - news-scraper-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsuser -d newsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Cache, Pub/Sub, Celery broker)
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - news-scraper-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenSearch (Full-text search)
  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - news-scraper-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OpenSearch Dashboards (optional - for debugging)
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - news-scraper-network
    profiles:
      - debug

  # Redpanda (Kafka-compatible, lighter weight)
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
    networks:
      - news-scraper-network
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redpanda Console (optional - for debugging)
  redpanda-console:
    image: redpandadata/console:latest
    environment:
      - KAFKA_BROKERS=redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      - redpanda
    networks:
      - news-scraper-network
    profiles:
      - debug

  # Redpanda to WebSocket Bridge Consumer
  # Consumes events from Redpanda and broadcasts to WebSocket via Redis
  redpanda-consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m backend.services.redpanda_consumer
    environment:
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BROKERS=redpanda:9092
    volumes:
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - news-scraper-network
    restart: unless-stopped

  # Database Backup Service
  # Runs pg_dump backups on a schedule via the Celery worker
  # Can also be triggered manually: docker-compose run --rm db-backup
  db-backup:
    image: timescale/timescaledb:latest-pg15
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=newsuser
      - PGPASSWORD=newspass
      - PGDATABASE=newsdb
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION_DAYS=7
    volumes:
      - ./scripts/backup-db.sh:/usr/local/bin/backup-db.sh:ro
      - db-backups:/backups
    entrypoint: ["/usr/local/bin/backup-db.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - news-scraper-network
    profiles:
      - backup

networks:
  news-scraper-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  opensearch-data:
  redpanda-data:
  model-cache:
  flower-data:
  db-backups:
