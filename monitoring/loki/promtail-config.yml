# Promtail Configuration for News Scraper
# Collects logs from Docker containers and sends to Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: news-scraper
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only containers with specific labels
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      # Add container ID for debugging
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
    pipeline_stages:
      # Parse JSON logs (structlog format)
      - json:
          expressions:
            level: level
            logger: logger
            message: event
            timestamp: timestamp
            trace_id: trace_id
            span_id: span_id
      # Extract additional fields from structlog
      - labels:
          level:
          logger:
          trace_id:
          span_id:
      # Timestamp parsing
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - "2006-01-02T15:04:05.999999999Z07:00"
      # Output formatting
      - output:
          source: message

  # API service logs
  - job_name: api
    static_configs:
      - targets:
          - localhost
        labels:
          job: api
          service: api
          __path__: /var/log/news-scraper/api/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: event
            request_id: request_id
            method: method
            path: path
            status_code: status_code
            duration: duration
            trace_id: trace_id
      - labels:
          level:
          logger:
          method:
          path:
          status_code:
          trace_id:

  # Celery worker logs
  - job_name: celery
    static_configs:
      - targets:
          - localhost
        labels:
          job: celery
          service: celery-worker
          __path__: /var/log/news-scraper/celery/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            task_name: task_name
            task_id: task_id
            message: event
            duration: duration
            trace_id: trace_id
      - labels:
          level:
          task_name:
          task_id:
          trace_id:

  # Scraper logs
  - job_name: scrapers
    static_configs:
      - targets:
          - localhost
        labels:
          job: scrapers
          service: scrapers
          __path__: /var/log/news-scraper/scrapers/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            scraper: scraper
            message: event
            source_url: source_url
            events_found: events_found
      - labels:
          level:
          scraper:

  # NLP service logs
  - job_name: nlp
    static_configs:
      - targets:
          - localhost
        labels:
          job: nlp
          service: nlp-service
          __path__: /var/log/news-scraper/nlp/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            model: model
            message: event
            processing_time: processing_time
            batch_size: batch_size
      - labels:
          level:
          model:

  # Syslog for infrastructure
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<host>\w+)\s+(?P<program>[^:]+):\s+(?P<message>.*)$'
      - labels:
          host:
          program:
      - timestamp:
          source: timestamp
          format: "Jan 02 15:04:05"
